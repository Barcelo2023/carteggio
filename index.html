       /* Stile accattivante quando il bottone si attiva */
.bottone-notifica-attiva {
  background-color: #d9383a !important; /* Rosso deciso */
  color: #ffffff !important;
  font-weight: bold !important;
  border: 2px solid #a61c1e !important;
  animation: pulsazioneNotifica 1.2s infinite alternate; /* Avvia l'effetto */
}

/* Animazione fluida di lampeggiamento */
@keyframes pulsazioneNotifica {
  from {
    opacity: 1;
    transform: scale(1);
    box-shadow: 0 0 5px rgba(217, 56, 58, 0.6);
  }
  to {
    opacity: 0.85;
    transform: scale(1.02); /* Crea un leggero effetto battito */
    box-shadow: 0 0 15px rgba(217, 56, 58, 0.9);
  }
}
