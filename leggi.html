<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leggi msg</title>
     <link rel="icon" href="img/favicon.png"  type="image/png">
    <style>

body
{
    margin: 0;
    padding: 0;
    display: flex;
    font-family: 'Times New Roman', serif;
    align-items: center;
    text-align: center;
}
   


#container{       
    height: 500px;
    width:273px;
    margin-left: 40px;
    margin-top: 50px;
    background-color: cornflowerblue;
    border-radius: 10px;
    border: 5px;
   
   
    
} 

h3{
    
    margin-top: 40px;
    
}

  
#key{
   height: 30px;
    width: 180px;   
    border-radius: 5px;   
    font-size: 14px;
    margin-top: 20px;   

}    


#error{
    color: red;        
}

#par{
    transform: translateY(30px);
}


textarea {
    line-height: 20px; 
    background-image: linear-gradient(transparent 19px, #ccc 19px);
    background-size: 100% 20px;
    border: 1px solid #ccc;
    padding: 5px;
    margin-top: 40px;
}
button{
    width: 60px;
    height: 35px;
    margin-top: 18px;
    border-radius: 5px;
    cursor: pointer;
    
}

#data{
     height: 20px;
    width: 140px;
   
    border-radius: 5px;
    padding: 0 15px;
    font-size: 12px;
    
    margin-top: 35px;
   

}  
button:hover{
    background-color: orangered;
}


  </style>
  </head>
  <body>
        

    <div id="container">
     <h3>Leggi messaggi:</h3>
          

       <p id="par">Inserisci Key</p> 
      <input type="password" name="Key" id="key" required  autocomplete="off">     
      
      <p id="error" ></p>  
      
    
      <p id="par">Messaggio</p>
      <textarea  name="message" id="message" rows="6"  cols="25" ></textarea>             
      
       <button  type="button" id="verifica" >Verifica key</button>

       <button  type="button" id="decripta"  disabled = "disabled"; >Decripta msg</button>       
        
      <button  type="button" id="cancella"   disabled = "disabled"; >Cancella msg</button>
            
       <input type="text" name="data" id="data" >

  
        
           <script type="module"> 
    
         // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
       import { getFirestore,collection, getDoc, deleteDoc, doc} from
        "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        // Your web app's Firebase configuration
        const firebaseConfig = {
        apiKey: "AIzaSyA_eM3aMEvqfDiQ5fPwkMPdpWh4SisVkAM",
            authDomain: "comunicare-8b181.firebaseapp.com",
            databaseURL: "https://comunicare-8b181-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comunicare-8b181",
           storageBucket: "comunicare-8b181.firebasestorage.app",
          messagingSenderId: "789151969586",
          appId: "1:789151969586:web:553bd996e8c46c15c3e72b"
         };

         // Initialize Firebase
         const app = initializeApp(firebaseConfig);

          // 1. Ottieni l'istanza del database
          const db = getFirestore(app);
         let numero ;        
        let conta;
        let msg;
        let lunghezza;
        let lettera;
        let converti;
        let pari;     
        let stringaConverti;
        let numeroRandom;
        let documentId;
        let dati;
        

            
            async function leggiDocumento() {
            // 1. Crea il riferimento al documento (collezione, idDocumento)
            const docRef = doc(db, "users", documentId);

            // 2. Ottieni lo snapshot
            const docSnap = await getDoc(docRef);
  
            // 3. Verifica se esiste e ottieni i dati
            if (docSnap.exists()) {                                    
            return docSnap.data();
          } else {
             document .getElementById("error").innerText = "controlla chiave"; 
        }
       }
           


            async function deleteRecord() {
         try {
         // Crea il riferimento al documento: doc(db, "collezione", "id_documento")
          const docRef = doc(db, "users", documentId);
    
          // Elimina il documento
          await deleteDoc(docRef);
          
           } catch (error) {
          document .getElementById("error").innerText = "non ha cancellato il msg";
           }
           }


             let data= new Date(); 
             document.getElementById('data').value = (data) ; 
             
             const verifica = document.getElementById('verifica');
               verifica.addEventListener('click', function() {  
                
              documentId = document.getElementById('key').value;
              
              lunghezza = documentId.length;

              if (lunghezza !=  20){
               document .getElementById("error").innerText = "controlla chiave"; 
               return    
              }
              document .getElementById("error").innerText = ""; 
                         
                leggiDocumento().then(data => {

                 numeroRandom  = data.numero; 
                 msg = data.messaggio;
                document.getElementById('message').value = data.messaggio;
                });                
 
                 
                  document.getElementById('decripta').disabled = false;                                             
             
                return             
      }) 
       
                const decripta = document.getElementById('decripta');
               decripta.addEventListener('click', function() {  
               
                                                        
                let  stringaConverti = "";
                let  numero = numeroRandom;
                
                 let lunghezza = msg.length;  

                 for ( let conta=0; conta <lunghezza; conta ++)
	               {		
                 let   lettera = msg[conta] ;  	     		 
                 let  converti = lettera.charCodeAt(0);
                  
	  	           let   pari = conta;	  	  	  	  

                 if (pari %2 == 0) {  
                  converti=converti + numero;
               
                }
                 else{     
                 converti = converti - numero; 
                
               }

                 numero = numero  -1;
            	
		         stringaConverti+=String.fromCharCode(converti) ;                             
         
          } 
              
                 document.getElementById("message").value = stringaConverti;
                 document.getElementById('cancella').disabled = false;  
                
      })    
                  const cancella = document.getElementById('cancella');
                 cancella.addEventListener('click', function() {  

                deleteRecord();
                        
                  document.getElementById("message").value = "";
                  document.getElementById("key").value = "";
               
               })

        
    </script>
     
        
 </body>
 </html>
