    <style>

body
{

     height: 20px;

  <body>
        

    <div id="container">
     <h3>Leggi messaggio</h3>
          

       <p id="par">Inserisci chiave</p> 
      <input type="password" name="Key" id="key" required  autocomplete="off">     
      
      <p id="error" ></p>  
      
    
      <p id="parm">Messaggio</p>
      <textarea  name="message" id="message" rows="5" readonly></textarea>             
      
       <button  type="button" id="verifica" >Estrae messaggio</button>

       <button  type="button" id="decripta"  disabled = "disabled" >Decripta messaggio</button>       
        
      <button  type="button" id="cancella"   disabled = "disabled" >Cancella messaggio</button>

       <button type="button" id="logoutBtn">esci</button>
            
       <input type="text" name="data" id="data" >

  
        
           <script type="module"> 
    
         // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
       import { getFirestore,collection, getDoc, deleteDoc, doc} from
        "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        // Your web app's Firebase configuration
        const firebaseConfig = {
        apiKey: "AIzaSyA_eM3aMEvqfDiQ5fPwkMPdpWh4SisVkAM",
            authDomain: "comunicare-8b181.firebaseapp.com",
            databaseURL: "https://comunicare-8b181-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comunicare-8b181",
           storageBucket: "comunicare-8b181.firebasestorage.app",
          messagingSenderId: "789151969586",
          appId: "1:789151969586:web:553bd996e8c46c15c3e72b"
         };

         // Initialize Firebase
         const app = initializeApp(firebaseConfig);

          // 1. Ottieni l'istanza del database
          const db = getFirestore(app);
         let numero ;        
        let conta;
        let msg;
        let lunghezza;
        let lettera;
        let converti;
        let pari;     
        let stringaConverti;
        let numeroRandom;
        let documentId;
        let dati;
        

            
            async function leggiDocumento() {
            // 1. Crea il riferimento al documento (collezione, idDocumento)
            const docRef = doc(db, "users", documentId);
            // 2. Ottieni lo snapshot
            const docSnap = await getDoc(docRef);
  
            // 3. Verifica se esiste e ottieni i dati
            if (docSnap.exists()) {                                    
            return docSnap.data();
          } else {
             document .getElementById("error").innerText = "chiave mancante o errata"; 
        }
       }
           
            async function deleteRecord(){
         try {
         // Crea il riferimento al documento: doc(db, "collezione", "id_documento")
          const docRef = doc(db, "users", documentId);

  
          // Elimina il documento
          await deleteDoc(docRef);
          document.getElementById("message").value = "messaggio cancellato con successo!";
           } catch (error) {
          
          console.error("Errore durante l'eliminazione: ", error);
           }
       }

             let data= new Date(); 
             document.getElementById('data').value = (data) ; 
             
             const verifica = document.getElementById('verifica');
             verifica.addEventListener('click', function() {  
                
             documentId = document.getElementById('key').value;

             lunghezza = documentId.length;          
             if (lunghezza === 0 ){
              document .getElementById("error").innerText = "chiave mancante o errata";               
               return
             }
            document.getElementById("error").innerText = ""; 
                         
            leggiDocumento().then(data => {

            numeroRandom  = data.numero; 
            numeroRandom =numeroRandom -3;
            msg = data.messaggio;
            document.getElementById('message').value = data.messaggio;
             document.getElementById('decripta').disabled = false;  
             });                
           
            
      })       
             const decripta = document.getElementById('decripta');
             decripta.addEventListener('click', function() {  
                                                                       
             let  stringaConverti = "";
             let  numero = numeroRandom;
                
             let lunghezza = msg.length; 
             

             for ( let conta=0; conta <lunghezza; conta ++)
	             {		
              let   lettera = msg[conta] ;  	     		 
              let  converti = lettera.charCodeAt(0);                 
	  	      let   pari = conta;	  	  	  	  
               if (pari %2 == 0) {  
               converti=converti + numero;               
                }
               else{     
                 converti = converti - numero;                 
               }
                 numero = numero  -1; 
                 if (numero == 0){
                  numero = numeroRandom ; 
                 }
		         stringaConverti+=String.fromCharCode(converti) ;                                      
          }               
                 document.getElementById("message").value = stringaConverti;
                 document.getElementById('cancella').disabled = false;                
      })    
                 const cancella = document.getElementById('cancella');
                 cancella.addEventListener('click', function() { 

                deleteRecord();                                        
                 
               })

               document.getElementById('logoutBtn').addEventListener('click', function() {    
              // 3. Reindirizza alla pagina di login
               window.location.href = "index.html";
              })

 
        
    </script>
     
        
 </body>
