<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leggi msg</title>
     <link rel="icon" href="img/favicon.png"  type="image/png">
       <link rel="stylesheet" href="style-leggi.css"> <!-- Il file CSS --> 

  </head>
  <body>
        

    <div class="container">
       <h1>Carteggio</h1> 
     <h2>Pagina leggi messaggi</h2>
                    
    
      <p id="parm">Messaggio</p>
      <textarea  name="message" id="message" rows="4" readonly></textarea>             
       <div id="error" ></div>
       <button  type="button" id="estrae"  disabled = "disabled"    > estrae</button>

       <button  type="button" id="decripta"  disabled = "disabled" > decripta</button>       
        
      <button  type="button" id="cancella"   disabled = "disabled" >cancella</button>
      <button  type="button" id="segreto" >...</button>

       <button type="button" id="logoutBtn">Pagina iniziale</button>

         
       <input type="text" name="data" id="data" >
        
       </div>
           <script type="module"> 
          let chiaveAttiva = null; 
       let chiaveDocumento = null;

           // 1. IMPORTANTE: Devi importare esplicitamente "db" dal tuo file locale
                   import { db } from "./firebaseConfig.js";
         // Import the functions you need from the SDKs you need
      
       import { getFirestore,collection,  getDoc, getDocs, deleteDoc, doc} from
        "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
       
      
    
        let numero ;        
        let conta;
        let msg;
        let lunghezza;
        let lettera;
        let converti;
        let pari;     
        let stringaConverti;
        let numeroRandom;
        let dati;
        

             let data= new Date(); 
             document.getElementById('data').value = (data) ; 


          
            

             let ultimaVolta = 0;
              const segreto = document.getElementById('segreto');
            // 1. Gestione per Telefono (Touch)
             segreto.addEventListener('touchend', function(event) {
              let tempoCorrente = new Date().getTime();
              let tempoTrascorso = tempoCorrente - ultimaVolta;
  
              if (tempoTrascorso < 300 && tempoTrascorso > 0) {
                 eseguiAzione();
                }
             ultimaVolta = tempoCorrente;
             });

           // 2. Gestione per PC (Mouse)
              segreto.addEventListener('dblclick', function(event) {
               eseguiAzione();
            });

            // 3. La funzione con l'azione da eseguire
             function eseguiAzione() {
           
            document.getElementById('estrae').disabled = false; 
                
            }
        



             
             const estrae = document.getElementById('estrae');
             estrae.addEventListener('click', function() { 

             chiaveAttiva = localStorage.getItem('id_casella_postale');  

             
    
             leggiUtenti().then(data => {
              if (chiaveDocumento === 'nonce') return    
            numeroRandom  = data.numero; 
            numeroRandom =numeroRandom -3;
            msg = data.messaggio;
            document.getElementById('message').value = data.messaggio;
             document.getElementById('decripta').disabled = false; 
             document.getElementById('estrae').disabled = true;  
             });              
          
            
      })      
             const decripta = document.getElementById('decripta');
             decripta.addEventListener('click', function() {  
                                                                       
             let  stringaConverti = "";
             let  numero = numeroRandom;
                
             let lunghezza = msg.length; 
             

             for ( let conta=0; conta <lunghezza; conta ++)
	             {		
              let   lettera = msg[conta] ;  	     		 
              let  converti = lettera.charCodeAt(0);                 
	  	      let   pari = conta;	  	  	  	  
               if (pari %2 == 0) {  
               converti=converti + numero;               
                }
               else{     
                 converti = converti - numero;                 
               }
                 numero = numero  -1; 
                 if (numero == 0){
                  numero = numeroRandom ; 
                 }
		         stringaConverti+=String.fromCharCode(converti) ;                                      
            }               
                 document.getElementById("message").value = stringaConverti;
                 document.getElementById('cancella').disabled = false; 
                 document.getElementById('decripta').disabled = true;                
          })    
                 const cancella = document.getElementById('cancella');
       cancella.addEventListener('click', function() { 
    
                deleteRecord();                                        
               
               
              document.getElementById('cancella').disabled = false;  
               })
           

        
              async function leggiUtenti() {         
          // 1. Crea il riferimento al documento specifico passando la chiave
           const ricevutiRef = collection(db, "casella_postale", chiaveAttiva, "ricevuti");

          // 2. Esegui la lettura
           const snapshotRicevuti = await getDocs(ricevutiRef);

             if (snapshotRicevuti.empty) {
             document.getElementById("error").innerText = "Non ci sono messaggi"; 
              chiaveDocumento = 'nonce';
              return  ;
            }                   
          const primoDocRicevuto = snapshotRicevuti.docs[0];
           chiaveDocumento  = primoDocRicevuto.id; // Questo è l'ID del messaggio
                  
                       
            // 1. Crea il riferimento al documento (collezione, idDocumento)
            const docRef = doc(db, "messaggi", chiaveDocumento);
            // 2. Ottieni lo snapshot
             const docSnap = await getDoc(docRef);
  
            // 3. Verifica se esiste e ottieni i dati
            if (docSnap.exists()) {                                    
           return docSnap.data();
          } else {
             document .getElementById("error").innerText = "non ci sono messaggi  "; 
        }
       }
           
            async function deleteRecord(){
                  
         try {
         // Crea il riferimento al documento: doc(db, "collezione", "id_documento")
            const docRef = doc(db, "messaggi", chiaveDocumento.trim());

          // Elimina il documento
          await deleteDoc(docRef);
        
          
  // 5. Cancella l'idDocumento dalla sottocollezione "ricevuti"
        const riferimentoRicevutoDaCancellare = doc(db, "casella_postale", chiaveAttiva, "ricevuti", chiaveDocumento);
        await deleteDoc(riferimentoRicevutoDaCancellare);
        
         window.location.href = "index.html";

       } catch (error) {
        console.error("Errore durante il processo:", error);
         document.getElementById("message").value = "errore durante il processo";
    }
}

         document.getElementById('logoutBtn').addEventListener('click', function() {    
              // 3. Reindirizza alla pagina di login
               window.location.href = "index.html";
              })
        
    </script>
     
        
 </body>
 </html>
