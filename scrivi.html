<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrivi msg</title>
     <link rel="icon" href="img/favicon.png"  type="image/png">
    <style>
  body{
    margin: 0;
    padding: 0;
    display: flex;
    font-family: 'Times New Roman', serif;
    align-items: center;
    text-align: center;
}
   


#container{       
    height: 550px;
    width:280px;
    margin-left: 40px;
    margin-top: 50px;
    background-color: cornflowerblue;
    border-radius: 10px;
    border: 5px;
    text-align: center; 
    justify-content: center;   
    
} 

#email
{
    height: 30px;
    width: 200px;
    border-radius: 5px;
    font-size: 13px;
    margin-top: 15px;
    cursor: pointer;
    
    
}    


textarea {
  display: block;
   width: 90%;
   box-sizing: border-box;
   resize: none;
   font-size: 14px;
   min-height: 50px;
   transform: translateX(12px);
   margin-top: 21px;
   overflow: auto;
   cursor: pointer;
}

#lab{
    display: inline-block;
    transform: translateY(16px);
}


button{
   width: 77px;
    height: 35px;
    margin-top: 18px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 30px;
  
   
}

#logoutBtn{
   
 
  width: 200px;
    height: 30px;
    margin-top: 18px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 30px;
   
}
#data
{
    height: 20px;
    width: 132px;
    display: flex;
    border-radius: 5px;
    font-size: 11px;
    margin-top: 25px;
    transform: translate(64px ,50px);
    
}  

#errorm{
     color: black;
    
}  

button:hover{
    
    background-color: red;
}
  </style>
  
</head>

    <body>
          
  
     <div id="container">
      <h2>Carteggio</h2>
     <h4>pagina scrivi messaggi</h4> 

     <form action=""  method="post" id="form" >  
     <label for="email" id="lab"  > email destinatario</label>
      
     <input type="text"   id="email"  required  autocomplete="off">
    
     
     <label for="message" id="lab" >Messaggio:</label>
     <textarea  disabled = "disabled"name="message" id="message" rows="5"   required></textarea>
     <div  id="errorm"   ></div>
       <button id="verifica" type="button">ricerca casella</button> 
      <button id="cripta" type="button"  disabled = "disabled">Cripta Messaggio</button> 

      <button id="salva" type="button"  disabled = "disabled" >Salva Messaggio</button> 
       
        <button id="logoutBtn" type="button">Pagina iniziale</button>
      <input type="text" id="data"  name="data" readonly>     
           
      </form>
      
      </div>
      
       <script type="module"> 
     let chiaveUtenti= "null";
     let chiaveDocumento = "null" ;
           
         // 1. IMPORTANTE: Devi importare esplicitamente "db" dal tuo file locale
      import { db } from "./firebaseConfig.js";
          // 2. Importi solo le funzioni di cui questa pagina ha bisogno  
    
     import { getFirestore,collection, getDoc, setDoc, addDoc,  doc} from
       "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
      
           
           let stringaAscii = "";
           let stringaConverti ;      
            let conta ;
            let testoMessage ="";
            let lunghezza = 0;
            let converti =0;
            let ascii = "";          
            let pari=0;
            let lettera = "";            
            let data ;
            let email;
            let key;          
            let  utente;
            let dataToSave;
            let messaggio;
            let lengemail;
            let braMessaggi ="" ;
            let randomNumber;
            let numero;
            let templateParams;

              
      

                       
                 data = new Date();                                                                
                 document.getElementById('data').value = (data) ; 
                 randomNumber= Math.floor(Math.random() * 40) + 1;
                randomNumber = randomNumber + 10;                                                                 
                 conta = 0;              
               do{	 
               	stringaAscii +=  String.fromCharCode(conta);                   
                 conta++;                 	
              	}while ( conta < 255); 
             

                 const btnverifica = document.getElementById('verifica');
                   btnverifica.addEventListener('click', function() {  

                       
                  email = document.getElementById('email').value;
                  lunghezza = email.length;
                  if (lunghezza < 10){
                    document .getElementById("errorm").innerText = "email errata o mancante"; 
                    return 
                  }
              
                  
                  const emailPulita = String(email).trim().toLowerCase();
                  chiaveUtenti = emailPulita.replaceAll(".", "-");
                  leggiCasellaPostale()                    
                  
                 
                })           

                  const btncripta = document.getElementById('cripta');
                   btncripta.addEventListener('click', function() {  
                           
                   testoMessage = document.getElementById('message').value;
                   document.getElementById('message').value=""; 

                 stringaConverti =""; 
                 numero = randomNumber;
                 lunghezza = testoMessage.length; 
                 if(lunghezza  < 2){
                 document .getElementById("errorm").innerText = "messaggio mancante"; 
                 return
                 }
                 document.getElementById("errorm").innerText = ""; 

               for (conta=0; conta <lunghezza; conta ++)
	               {		
                 lettera = testoMessage[conta] ;  	     		 
                 converti = lettera.charCodeAt(0);                
	  	           pari = conta;	  	  	  	  
                if (pari %2 == 0) {  
                converti=converti -numero;               
                 }
                 else{     
                 converti = converti +numero;                 
                }
                numero = numero  -1; 
                if(numero == 0){
                  numero=randomNumber
                }
                
		            stringaConverti+= String.fromCharCode(converti) ;          
              }        
                 
                 document.getElementById('message').value  = stringaConverti; 
                 document.getElementById('cripta').disabled = true; 
                 document.getElementById('salva').disabled = false;  
                
       }) 
                 const btnsalva = document.getElementById('salva');
                 btnsalva.addEventListener('click', function() {  

                 stringaConverti = document.getElementById ('message').value;
        
                 randomNumber = randomNumber + 3;              
                  utente = { numero: randomNumber, messaggio: stringaConverti, creato :new Date() }; 
                // 2. Conversione in stringa JSON
                  const jsonString = JSON.stringify(utente);
                  dataToSave = JSON.parse(jsonString);

                   aggiungiMessaggi().then(chiave => {
                
                    chiaveDocumento = chiave ; 
    
                              
                     aggiungiRicevuti() 
                     
                     document.getElementById('salva').disabled = true;
                   
                                                
                   })            
                                                           
                   

                 })      
                  

          
              async  function aggiungiMessaggi(){           
                   try {
             const docRef = await addDoc(collection(db, "messaggi"), dataToSave);
               document.getElementById("message").value = "messaggio salvato con successo"; 
               document.getElementById('message').disabled = true;
               return docRef.id; 
              } catch (e) {
                document.getElementById("errorm").innerText = "errore inserimento messaggio ";
                            
                    return
                }
             }                                                          
                                                                                       
             async  function aggiungiRicevuti(){ 

              try {
            // Il percorso punta al documento che ha come ID il valore di chiaveDocumento
            const docRef = doc(db, "casella_postale", chiaveUtenti, "ricevuti", chiaveDocumento);
  
          // Salviamo il documento inserendo anche solo un timestamp (comodo per ordinarli per data)
            await setDoc(docRef, { 
           creatoIl: new Date() 
           });

           document.getElementById("message").value = "messaggio salvato con successo!"; 
             return chiaveDocumento;   

         } catch (firebaseError) {
           document.getElementById("errorm").innerText = "errore inserimento chiave messaggio";
          console.log("Errore testuale:", String(firebaseError));
          return;
         }

       
      }

              async function leggiCasellaPostale() {  
                    
               // 1. Crea il riferimento al documento specifico passando la chiave
                const docRef = doc(db, "casella_postale", chiaveUtenti);

                             // 2. Esegui la lettura
                 const docSnap = await getDoc(docRef);

                  // 3. Controlla se il documento esiste prima di leggerlo
                 if (docSnap.exists()) {  
                    document.getElementById('message').disabled = false;
                    document.getElementById('verifica').disabled = true;
                    document.getElementById('cripta').disabled = false;
                    document.getElementById("errorm").innerText = "";     
                    return docSnap.data();
           
                  } else {        
                 document .getElementById("errorm").innerText = "Utente senza casella";                  
                return 
                }
              }     
             
                   document.getElementById('logoutBtn').addEventListener('click', function() {    
              // 3. Reindirizza alla pagina di login
               window.location.href = "index.html";
              })
    </script>
              
  </body>
  </html>
