<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteggio</title>

    <link rel="icon" href="img/logo.png"  type="image/png">
    <link rel="stylesheet" href="style-casella.css"> <!-- Il file CSS -->   
  
  </head>
  <body>
         
        <div class="container">
  <h2>Carteggio</h2>
  <h4>pagina crea casella postale</h4>

  <p>Scrivi due volte la tua email</p>
 
  <input type="text" id="email" onpaste="return false;" 
  ondrop="return false;" required autocomplete="off">
  <input type="text" id="emailRipeti"  required autocomplete="off">


  <div id="error"></div> 
  
  <button type="button" id="btnv">crea casella</button>           
  <button id="logoutBtn" type="button">Pagina iniziale</button>

  <input type="text" name="data" id="data" readonly>
</div>

      
    
         <script type="module"> 
     let mioIdCasella;
          // 1. IMPORTANTE: Devi importare esplicitamente "db" dal tuo file locale
      import { db } from "./firebaseConfig.js";
           // Import the functions you need from the SDKs you need
    
     import { getFirestore,collection, getDoc, setDoc, addDoc,  doc} from
       "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
     
 
            let data = new Date(); 
            document.getElementById('data').value = (data); 


            document.getElementById('btnv').addEventListener('click', function(event) { 

            event.preventDefault(); 
            let  email; 
            let emailRipeti;           
            let lengemail;
            let conta;
            let lettera;
            let chioc;
     
        
             email = document.getElementById('email').value; 

             emailRipeti = document.getElementById('emailRipeti').value; 

 
           
                  lengemail = email.length;
                  if (lengemail < 5){
                  document .getElementById("error").innerText = "inserisci una email valida"; 
                 return                              
                  } 
                  
                   lengemail = emailRipeti.length;
                  if (lengemail < 5){
                  document .getElementById("error").innerText = "inserisci una email valida"; 
                 return                              
                  }  
                  
                   if (email !== emailRipeti){
                   document .getElementById("error").innerText = "le due email non concordano"; 
                   return 
                 }
                  conta = 0;                
                  do {
                   lettera = email[conta] ; 
                   if (lettera === ',') {
                    document .getElementById("error").innerText = "inserisci una email valida"
                    return
                   }               
                          
                   if (lettera === '@')  chioc = lettera ; 
                                                     
                   conta++;
                   } while (conta <lengemail); 
      
                 if (chioc !== '@'){
                 document .getElementById("error").innerText = "inserisci una email valida"; 
                 return                              
                 } 
                                 
                         const emailPulita1 = String(email).trim().toLowerCase(); 
             const emailPulita2 =  emailPulita1.replaceAll(".", "a");
             const emailPulita3  = emailPulita2.replaceAll("@", "t"); 
             const emailPulita4  = emailPulita3.replaceAll("i", "a");            
             const chiaveUtenti  = emailPulita4.replaceAll("g", "z");    


                    insertCasella()
                      
        })        

           async function insertCasella() {

   
            // Controlla la memoria interna del telefono
            mioIdCasella = localStorage.getItem("id_casella_postale");
    
            if (mioIdCasella) {
            document .getElementById("error").innerText = "la casella è già stata creata"; 
            
             }

             // Prima volta in assoluto: genera un ID unico e lo salva sul telefono
               mioIdCasella = chiaveCasella;                                   

       // 1. Riferimento al documento usando il valore come ID
        const docRef = doc(db, "casella_postale", mioIdCasella);
  
        // 2. Tenta di recuperare il documento
        const docSnap = await getDoc(docRef);

       // 3. Verifica l'esistenza usando .exists()
       if (docSnap.exists()) {
       document .getElementById("error").innerText = "la casella è già stata creata"; 
       return false;
        }

         // 4. Se NON esiste, procedi con l'inserimento
               await setDoc(docRef, { 
           creatoIl: new Date() 
           
           });
           localStorage.setItem("id_casella_postale", mioIdCasella)
           document .getElementById("error").innerText = "creazione effettuata";    
           return true;
}


                 document.getElementById('logoutBtn').addEventListener('click', function() {    
              // 3. Reindirizza alla pagina di login
               window.location.href = "index.html";
              })

  </script> 
  
  </body>
  </html>
