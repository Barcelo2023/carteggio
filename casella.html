<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteggio</title>

    <link rel="icon" href="img/logo.png"  type="image/png">
    <style>
    

   body{
    margin: 0;
    padding: 0;

    align-items: center;
}
   

#container{       
    height: 550px;

    margin-top: 50px;  
    background-color: cornflowerblue;
    border-radius: 10px;
    text-align: center; 
    justify-content: center;   
    
}

h3{
    margin-top: 30px;

}
input{
   height: 30px;
    width: 200px;  
    border-radius: 5px;   
    font-size: 18px;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

}
#data
{
    height: 20px;
    width: 125px;  
    border-radius: 5px;   
    font-size: 12px;
    font-family: 'Times New Roman', serif;
    margin-top: 80px;
    border: groove;
  
}    

 button
{
    width: 150px;

   margin-top: 5px;

  </style>
  </head>
  <body>
         

      <div id="container">
     <h3>Carteggio</h3>
     <h4>pagina crea casella postale</h4>

     <label for="email" id="lab"  > email utente</label>
      
     <input type="text"   id="email"  required  autocomplete="off">
     <div  id="error"   ></div> 
       <button   type="button"  id="btnv" >crea casella</button>           
        <button id="logoutBtn" type="button">Pagina iniziale</button>

       <input type="text" name="data" id="data"  readonly>
       
      </div> 
         <script type="module"> 
     let mioIdCasella;
          // 1. IMPORTANTE: Devi importare esplicitamente "db" dal tuo file locale
      import { db } from "./firebaseConfig.js";
           // Import the functions you need from the SDKs you need
    
     import { getFirestore,collection, getDoc, setDoc, addDoc,  doc} from
       "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
     
 
            let data = new Date(); 
            document.getElementById('data').value = (data); 


            document.getElementById('btnv').addEventListener('click', function() { 

            let email;            
            let lengemail;
            let conta;
            let lettera;
            let chioc;
            
             document .getElementById("error").value = ""; 
        
             email = document.getElementById('email').value; 

                  lengemail = email.length;
                  if (lengemail < 10){
                  document .getElementById("error").innerText = "inserisci una email valida"; 
                 return                              
                  }                  
                  conta = 0;                
                  do {
                   lettera = email[conta] ;                 
                          
                   if (lettera === '@')  chioc = lettera ; 
                                                     
                   conta++;
                   } while (conta <lengemail); 
      
                 if (chioc != '@'){
                 document .getElementById("error").innerText = "inserisci una email valida"; 
                 return                              
                 } 
                 
                 const emailPulita = String(email).trim().toLowerCase();
                 const chiaveCasella = emailPulita.replaceAll(".", "-");
                 document.getElementById("error").innerText = ""; 


               // Controlla la memoria interna del telefono
                 mioIdCasella = localStorage.getItem("id_casella_postale");
           

                 if (!mioIdCasella) {
                 // Prima volta in assoluto: genera un ID unico e lo salva sul telefono
                   mioIdCasella = chiaveCasella;
                   localStorage.setItem("id_casella_postale", mioIdCasella);
                    
                 // Controlla se casella  esiste                                   

                    insertCasella()
                      
                } else {
                                // Utente già noto
                  document .getElementById("error").innerText = "creazione già effettuata"; 
                }                           

               })   
                       

        async function insertCasella() {
       // 1. Riferimento al documento usando il valore come ID
        const docRef = doc(db, "casella_postale", mioIdCasella);
  
        // 2. Tenta di recuperare il documento
        const docSnap = await getDoc(docRef);

       // 3. Verifica l'esistenza usando .exists()
       if (docSnap.exists()) {
       document .getElementById("error").innerText = "creazione effettuata"; 
       return false;
        }

         // 4. Se NON esiste, procedi con l'inserimento
               await setDoc(docRef, { 
           creatoIl: new Date() 
           });
         document .getElementById("error").innerText = "creazione effettuata";    
           return true;
}


                 document.getElementById('logoutBtn').addEventListener('click', function() {    
              // 3. Reindirizza alla pagina di login
               window.location.href = "index.html";
              })

  </script> 
  
  </body>
  </html>
